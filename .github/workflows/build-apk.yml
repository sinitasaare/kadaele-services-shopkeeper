name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_reason:
        description: 'Reason for this build (optional)'
        required: false
        default: 'Manual build'

# Add permissions for the workflow
permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm install
        npm install firebase --legacy-peer-deps

    - name: Build web app
      run: npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli

    - name: Add Android Platform
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Install ImageMagick
      run: sudo apt-get update && sudo apt-get install -y imagemagick

    - name: Generate App Icons and Splash Screens
      run: |
        chmod +x generate-icons.sh
        ./generate-icons.sh
    
    - name: Sync icons to Android
      run: npx cap sync android

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.run_number }}
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
        
    - name: Delete old artifacts
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          
          // Get all artifacts for this repository
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner,
            repo,
            per_page: 100
          });
          
          // Filter artifacts from this workflow and sort by creation date
          const workflowArtifacts = artifacts.data.artifacts
            .filter(artifact => artifact.name.startsWith('app-debug-'))
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
          
          // Keep only the 5 most recent, delete the rest
          const artifactsToDelete = workflowArtifacts.slice(5);
          
          for (const artifact of artifactsToDelete) {
            try {
              console.log(`Deleting artifact: ${artifact.name} (ID: ${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id
              });
            } catch (error) {
              console.log(`Failed to delete artifact ${artifact.name}: ${error.message}`);
            }
          }
          
          console.log(`Kept ${Math.min(workflowArtifacts.length, 5)} most recent artifacts`);
          console.log(`Deleted ${artifactsToDelete.length} old artifacts`);
